name: OpenSpec

on:
  push:
    paths:
      - "openspec/**"
      - "docs/api/**"
      - ".github/workflows/openspec.yml"
  pull_request:
    paths:
      - "openspec/**"
      - "docs/api/**"
      - ".github/workflows/openspec.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate OpenSpec
        run: npx --yes @fission-ai/openspec@1.5.0 validate --all --strict
