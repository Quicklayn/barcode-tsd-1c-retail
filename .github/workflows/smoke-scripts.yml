name: Smoke Scripts

on:
  push:
    paths:
      - "docs/testing/**/*.ps1"
      - "docs/api/**"
      - "openspec/specs/**"
      - "extension/src/Configuration.xml"
      - "extension/src/HTTPServices/BarcodeTSD.xml"
      - "extension/src/HTTPServices/BarcodeTSD/**"
      - ".github/workflows/smoke-scripts.yml"
  pull_request:
    paths:
      - "docs/testing/**/*.ps1"
      - "docs/api/**"
      - "openspec/specs/**"
      - "extension/src/Configuration.xml"
      - "extension/src/HTTPServices/BarcodeTSD.xml"
      - "extension/src/HTTPServices/BarcodeTSD/**"
      - ".github/workflows/smoke-scripts.yml"

jobs:
  powershell-syntax:
    name: PowerShell syntax
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse smoke scripts
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -LiteralPath docs\testing -Filter *.ps1 -Recurse
          foreach ($file in $files) {
            $errors = $null
            $tokens = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$errors
            ) > $null

            if ($errors.Count -gt 0) {
              throw "PowerShell syntax errors in $($file.FullName): $($errors | Out-String)"
            }
          }

      - name: Check contract consistency
        shell: powershell
        run: .\docs\testing\test-contract-consistency.ps1
