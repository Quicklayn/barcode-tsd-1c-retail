name: Android

on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

jobs:
  build:
    name: Build and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build and lint Android app
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:lintDebug --no-daemon --no-configuration-cache

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: barcode-tsd-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-verification-reports
          path: |
            android/app/build/reports/lint-results-debug.html
            android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn
