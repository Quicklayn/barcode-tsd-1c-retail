schema: spec-driven

context: |
  Project: Barcode TSD for 1C:Retail 3.0.
  Stack: 1C:Enterprise extension under extension/** and native Kotlin/Gradle Android app under android/**.
  Contract: OpenAPI files under docs/api/** are the boundary between Android and 1C.
  Baseline: RT3/** is read-only and must never be changed by application work.
  Android compatibility: minSdk=26 (Android 8.0 Oreo).
  Delivery: OpenSpec is the only SDD workflow; do not add Spec Kit, Memory Bank, TaskMaster, or another parallel framework.
  Architecture: new 1C work is extension-first unless an approved design explicitly says otherwise.
  Verification: use repository scripts and lockfiles; do not depend on globally installed project tools.

rules:
  proposal:
    - State the user or engineering problem, scope, non-goals, affected stacks, and rollback boundary.
    - List every new or modified capability with its exact kebab-case spec directory.
    - Do not describe product behavior that is not requested by the change.
  specs:
    - Use normative MUST or SHALL language and exactly four hashes for every Scenario heading.
    - Cover cross-stack behavior at the API boundary when Android and 1C are both affected.
    - Include failure and compatibility scenarios that can be verified by tests or repository gates.
  design:
    - Record architecture, placement, ownership, dependency, error-handling, security, migration, rollback, and verification decisions.
    - Assign disjoint write scopes to subagents and keep RT3/** read-only.
    - Resolve routine decisions before apply; leave Open Questions only when the answer depends on later live evidence.
  tasks:
    - Each checkbox must name concrete files or ownership, state a verifiable completion condition, and follow dependency order.
    - Include strict OpenSpec validation, relevant stack tests, contract checks, review, spec synchronization, and archive.
    - Do not mark a task complete until its command or observable acceptance check has passed.
